
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-quotations}"]
      interval: 10s
      timeout: 5s
      retries: 5

  workspace:
    build:
      context: .
      dockerfile: .docker/workspace/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
    env_file:
      - .env
    tty: true
    stdin_open: true
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
